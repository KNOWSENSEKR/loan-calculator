<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 대출 계산기 | 머니파인더</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { background-color: #ffffff; color: #334155; font-family: 'Pretendard', sans-serif; -webkit-font-smoothing: antialiased; }
        .nav-scroll { display: flex; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .nav-link { padding: 1rem 0.75rem; font-weight: 700; color: #94a3b8; transition: 0.3s; border-bottom: 4px solid transparent; flex-shrink: 0; font-size: 0.95rem; }
        .nav-link.active { color: #1d4ed8; border-bottom: 4px solid #1d4ed8; }
        .main-container { max-width: 900px; margin: 0 auto; padding: 0 1.25rem 5rem; }
        @media (min-width: 768px) { .main-container { padding: 0 2rem 10rem; } }
        .calc-section { background: #0f172a; border-radius: 24px; padding: 2rem; color: white; margin-top: 2rem; box-shadow: 0 20px 40px rgba(15, 23, 42, 0.15); }
        @media (min-width: 768px) { .calc-section { border-radius: 32px; padding: 4rem; } }
        .input-box { width: 100%; padding: 1.1rem; border-radius: 12px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); color: white; font-size: 1.5rem; font-weight: 900; outline: none; transition: 0.3s; }
        .input-box:focus { background: white; color: #0f172a; border-color: #3b82f6; }
    </style>
</head>
<body>

    <header class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-3 md:py-0 md:h-20 flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center justify-center w-full md:w-auto py-2 md:py-0">
                <div class="text-3xl font-black text-blue-700 tracking-tighter shrink-0 cursor-pointer" onclick="location.href='index.html'">머니파인더</div>
            </div>
            <nav class="nav-scroll w-full md:w-auto mt-2 md:mt-0 border-t md:border-t-0 pt-2 md:pt-0">
                <a href="calculator.html" class="nav-link active">대출계산기</a>
                <a href="index.html" class="nav-link">신용대출</a>
                <a href="mortgage.html" class="nav-link">주택담보대출</a>
                <a href="rent.html" class="nav-link">전월세 대출</a>
                <a href="car.html" class="nav-link">자동차담보대출</a>
                <a href="sunshine.html" class="nav-link">햇살론대출</a>
                <a href="unemployed.html" class="nav-link">무직자대출</a>
            </nav>
        </div>
    </header>

    <div class="main-container">
        <div class="calc-section">
            <div class="mb-8">
                <h4 class="text-xl font-black text-blue-400 mb-1 italic tracking-tight uppercase">Universal Loan Simulator</h4>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">통합 대출 상환 시뮬레이션</p>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8 mb-10">
                <div class="input-group">
                    <label class="text-[11px] font-bold text-slate-500 uppercase mb-2 block">대출 원금 (원)</label>
                    <input type="number" id="amt" class="input-box" placeholder="0">
                </div>
                <div class="input-group">
                    <label class="text-[11px] font-bold text-slate-500 uppercase mb-2 block">연 이자율 (%)</label>
                    <input type="number" id="rate" step="0.1" class="input-box" placeholder="0.0">
                </div>
                <div class="input-group">
                    <label class="text-[11px] font-bold text-slate-500 uppercase mb-2 block">상환 기간 (개월)</label>
                    <input type="number" id="months" class="input-box" placeholder="0">
                </div>
            </div>
            
            <button onclick="doCalc()" class="w-full py-5 bg-blue-600 text-white text-2xl font-black rounded-2xl hover:bg-blue-500 transition-all shadow-xl active:scale-95">분석 실행하기</button>
            
            <div id="res" class="hidden mt-10 p-8 bg-white/5 rounded-2xl border border-white/10 text-center">
                <p class="text-xs font-bold text-blue-400 mb-3 uppercase tracking-widest">매월 예상 상환액</p>
                <p id="res-m" class="text-4xl md:text-5xl font-black text-white tracking-tighter">-</p>
            </div>
        </div>
    </div>

    <script>
        function doCalc() {
            const P = parseFloat(document.getElementById('amt').value);
            const rate = parseFloat(document.getElementById('rate').value);
            const n = parseFloat(document.getElementById('months').value);
            if (!P || isNaN(rate) || !n) return alert("데이터를 정확히 입력하십시오.");
            const r = (rate / 100) / 12;
            let m;
            if (r === 0) m = P / n;
            else m = (P * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
            document.getElementById('res-m').innerText = Math.round(m).toLocaleString() + " 원";
            document.getElementById('res').classList.remove('hidden');
        }
    </script>
</body>
</html>
