    <script>
        const loanData = {
            credit: {
                title: "신용대출",
                subtitle: "당신의 신뢰도가 자본이 되는 무담보 금융 솔루션",
                content: `
                    <p>신용대출은 개인의 '신용' 자체가 담보가 되는 금융 상품입니다. 주택이나 자동차 같은 실물 담보 없이 오직 차주의 소득 수준, 직장 정보, 과거의 금융 거래 이력, 그리고 현재 보유한 부채 규모를 종합적으로 평가하여 한도와 금리를 결정합니다. 이는 금융사와 개인 간의 가장 원초적인 신뢰 거래라고 볼 수 있습니다.</p>
                    
                    <h3>1. 신용대출의 심층적인 분류 체계</h3>
                    <p>신용대출은 이용하는 금융 기관의 성격과 대상자의 조건에 따라 매우 세분화되어 운영됩니다.</p>
                    
                    <h4>제1금융권(은행) 신용대출</h4>
                    <p>KB국민, 신한, 우리, 하나은행과 같은 시중은행과 카카오뱅크, 토스뱅크 등 인터넷 은행이 여기에 해당합니다. 가장 큰 장점은 연 4~7%대의 낮은 금리와 높은 신뢰도입니다. 하지만 승인 기준이 매우 까다로워 대기업 직장인, 공무원, 혹은 신용점수가 850점 이상의 우량 고객이 주 대상입니다.</p>
                    
                    <h4>제2금융권(저축은행, 캐피탈, 카드사)</h4>
                    <p>은행권 이용이 어려운 중저신용자를 위한 시장입니다. 승인이 비교적 빠르고 서류 절차가 간소하다는 장점이 있으나, 금리가 연 10~19%대로 형성되어 이자 부담이 큽니다. 카드사의 카드론이나 현금서비스도 이 범주에 포함됩니다.</p>
                    
                    <h3>2. 금리 산출의 비밀: 가산금리와 우대금리</h3>
                    <p>우리가 받는 대출 금리는 단순히 정해지는 것이 아닙니다. [기준금리 + 가산금리 - 우대금리]라는 공식이 적용됩니다. 기준금리는 코픽스(COFIX)나 금융채 금리를 따르며 개인이 조절할 수 없지만, 가산금리는 본인의 신용점수에 따라 결정됩니다. 반면 우대금리는 급여 이체, 신용카드 실적 등을 통해 개인이 깎을 수 있는 부분입니다.</p>
                    
                    <h3>3. DSR 규제와 신용대출의 관계</h3>
                    <p>최근 금융 시장에서 가장 중요한 단어는 DSR(총부채원리금상환비율)입니다. 연간 소득에서 모든 대출의 원금과 이자가 차지하는 비중을 뜻하는데, 2026년 현재 대다수 금융권에서는 40% 룰이 적용됩니다. 신용대출은 주담대와 달리 만기를 5년으로 고정해서 DSR을 계산하는 경우가 많아, 한도가 예상보다 적게 나올 수 있다는 점을 명시해야 합니다.</p>
                    
                    <h3>4. 신용점수를 올리는 실전 팁</h3>
                    <p>대출을 받기 전 최소 3개월 동안은 절대 연체를 해서는 안 됩니다. 10만 원 미만의 소액 연체라도 기록에 남으면 치명적입니다. 또한 체크카드를 매월 30만 원 이상 꾸준히 사용하거나 통신비 납부 내역을 신용평가사에 제출하는 것만으로도 가산점을 얻을 수 있습니다.</p>
                    
                    <h3>5. 상환 방식의 장단점 비교</h3>
                    <p><strong>원리금균등분할상환</strong>은 매달 내는 돈이 일정해 계획 수립에 좋습니다. <strong>원금균등분할상환</strong>은 초기에 부담이 크지만 전체 이자가 가장 적습니다. <strong>만기일시상환</strong>은 이자만 내다가 나중에 갚는 방식으로 초기 부담이 없지만 총 이자가 가장 비쌉니다.</p>
                `
            },
            mortgage: {
                title: "주택담보대출",
                subtitle: "내 집 마련의 꿈을 지탱하는 가장 거대한 금융 기둥",
                content: `
                    <p>주택담보대출(주담대)은 매수하고자 하는 주택이나 이미 소유한 부동산을 담보로 은행에서 자금을 빌리는 상품입니다. 가계 부채의 가장 큰 부분을 차지하며, 상환 기간이 30년에서 최대 50년에 달하는 만큼 인생의 재무 설계에서 가장 신중해야 할 영역입니다.</p>
                    
                    <h3>1. 주담대의 3대 핵심 규제: LTV, DTI, DSR</h3>
                    <p>대한민국 부동산 금융 정책의 핵심은 다음 세 지표입니다.</p>
                    <ul>
                        <li><strong>LTV (담보인정비율):</strong> 집값의 몇 %까지 빌려줄 것인가입니다. 지역에 따라 40%에서 70% 사이로 변동됩니다.</li>
                        <li><strong>DTI (총부채상환비율):</strong> 연소득 대비 주담대 원리금과 기타 대출 이자액의 합계를 봅니다.</li>
                        <li><strong>DSR (총부채원리금상환비율):</strong> 소득 대비 모든 대출의 원리금을 합산하는 가장 강력한 규제입니다.</li>
                    </ul>

                    <h3>2. 금리 선택의 딜레마: 고정 vs 변동 vs 주기형</h3>
                    <p>현재 금융당국은 금리 변동 리스크를 줄이기 위해 <strong>주기형(5년 고정 후 변동)</strong> 상품을 적극 권장하고 가산금리 혜택을 줍니다. 순수 고정금리는 향후 금리 인하가 예상될 때 불리할 수 있고, 변동금리는 금리 인상기에 상환액이 폭증할 위험이 있습니다. 자신의 자금 여력과 향후 경기 전망을 복합적으로 판단해야 합니다.</p>

                    <h3>3. 정책 금융 상품의 우선 활용</h3>
                    <p>일반 시중은행 대출을 알아보기 전, 반드시 정부 지원 상품을 체크해야 합니다. <strong>디딤돌 대출</strong>(무주택 서민), <strong>보금자리론</strong>(실거주 목적), <strong>신생아 특례대출</strong>(출산 가구) 등은 연 1~3%대의 파격적인 금리를 제공합니다. 자격 요건만 된다면 무조건 1순위로 고려해야 합니다.</p>

                    <h3>4. 대출 실행 프로세스 및 부대비용</h3>
                    <p>주담대는 서류 제출부터 잔금 지급까지 약 1개월 정도 소요됩니다. 이때 대출 원금만 생각해서는 안 됩니다. 인지세(은행과 5:5), 채권매입비용, 근저당권 설정비(은행 부담), 화재보험료 등 수백만 원의 부대비용이 발생할 수 있으니 예산에 포함해야 합니다.</p>

                    <h3>5. 중도상환수수료와 갈아타기 전략</h3>
                    <p>보통 대출 후 3년이 지나면 중도상환수수료가 면제됩니다. 최근에는 '온라인 대환대출 플랫폼'을 통해 더 낮은 금리로 쉽게 갈아탈 수 있는 환경이 조성되었습니다. 매월 이자 비용을 단 0.1%라도 줄일 수 있다면 갈아타기를 적극 검토해야 합니다.</p>
                `
            },
            rent: {
                title: "전월세 대출",
                subtitle: "주거의 안정을 보장하는 합리적인 보증금 지원 가이드",
                content: `
                    <p>전월세 대출은 임대차 계약 시 부족한 보증금을 조달하기 위해 받는 대출입니다. 주택도시보증공사(HUG)나 한국주택금융공사(HF)의 보증서를 기반으로 진행되는데, 이는 은행이 직접 돈을 빌려주기보다 보증기관이 담보를 서주는 구조이기 때문입니다.</p>
                    
                    <h3>1. 보증 기관별 상품의 결정적 차이</h3>
                    <p>전세 대출은 어떤 보증서를 선택하느냐에 따라 한도와 자격이 완전히 달라집니다.</p>
                    <ul>
                        <li><strong>HUG 안심전세:</strong> 보증금 반환 보증이 결합되어 있어 전세 사기 예방에 탁월합니다. 무주택자나 신혼부부에게 유리하며 한도가 높습니다.</li>
                        <li><strong>HF 전세자금:</strong> 소득 대비 한도가 산정됩니다. 소득 증빙이 확실한 직장인에게 적합하며 집주인의 동의가 비교적 간소합니다.</li>
                        <li><strong>SGI 서울보증:</strong> 보증금 액수가 큰 고가 전세(한도 최대 5억 이상) 시 주로 활용됩니다.</li>
                    </ul>

                    <h3>2. 대출 실행 시점과 전입신고의 중요성</h3>

            document.getElementById('tab-' + type).classList.add('active');

            document.getElementById('main-title').innerText = item.title;
            document.getElementById('sub-title').innerText = item.subtitle;
            document.getElementById('info-area').innerHTML = item.content;

            document.getElementById('res-area').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 대출 계산 로직 (원리금균등)
        function doCalc() {
            const P = parseFloat(document.getElementById('amt').value);
            const rate = parseFloat(document.getElementById('rate').value);
            const n = parseFloat(document.getElementById('months').value);

            if (!P || isNaN(rate) || !n) {
                alert("정확한 대출 정보를 입력해 주세요.");
                return;
            }

            const r = (rate / 100) / 12;
            let monthlyPay;
            if (r === 0) monthlyPay = P / n;
            else monthlyPay = (P * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
            
            const totalInt = (monthlyPay * n) - P;

            document.getElementById('res-monthly').innerText = Math.round(monthlyPay).toLocaleString() + " 원";
            document.getElementById('res-interest').innerText = Math.round(totalInt).toLocaleString() + " 원";
            
            const resBox = document.getElementById('res-area');
            resBox.classList.remove('hidden');
            resBox.scrollIntoView({ behavior: 'smooth' });
        }

        // 초기 실행
