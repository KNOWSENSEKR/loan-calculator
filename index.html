<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>머니파인더 | 스마트 금융 AI 가이드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scroll-behavior: smooth; }
        body { background-color: #f8fafc; color: #1e293b; }
        .nav-link { transition: all 0.2s; border-bottom: 3px solid transparent; cursor: pointer; }
        .nav-link.active { color: #1d4ed8; border-bottom: 3px solid #1d4ed8; font-weight: 900; }
        .ai-card { background: #ffffff; border-radius: 24px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); }
        .ai-badge { background: linear-gradient(90deg, #4285f4, #34a853, #fbbc05, #ea4335); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 flex justify-between items-center h-20">
            <div class="text-3xl font-black text-blue-700 tracking-tighter cursor-pointer" onclick="location.reload()">
                머니파인더
            </div>
            <nav class="hidden lg:flex space-x-10 text-base font-bold text-slate-500">
                <div onclick="showLoan('credit')" class="nav-link py-6 px-1 active" id="btn-credit">신용대출</div>
                <div onclick="showLoan('mortgage')" class="nav-link py-6 px-1" id="btn-mortgage">주택담보대출</div>
                <div onclick="showLoan('rent')" class="nav-link py-6 px-1" id="btn-rent">전월세 대출</div>
                <div onclick="showLoan('car')" class="nav-link py-6 px-1" id="btn-car">자동차담보대출</div>
            </nav>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-10">
        
        <section class="ai-card p-8 md:p-10 mb-10 border border-slate-100">
            <div class="mb-8">
                <h2 id="loan-title" class="text-3xl font-black text-slate-900 mb-2">신용대출 상환 시뮬레이션</h2>
                <p id="loan-desc" class="text-slate-500 font-medium">한도와 이자를 즉시 계산하고 AI 분석 결과를 확인하세요.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="space-y-2">
                    <label class="block text-xs font-black text-slate-500 uppercase">대출 금액 (원)</label>
                    <input type="number" id="amount" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:outline-none transition-all" placeholder="예: 30000000">
                </div>
                <div class="space-y-2">
                    <label class="block text-xs font-black text-slate-500 uppercase">연 이자율 (%)</label>
                    <input type="number" id="interest" step="0.01" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:outline-none transition-all" placeholder="예: 5.5">
                </div>
                <div class="space-y-2">
                    <label class="block text-xs font-black text-slate-500 uppercase">대출 기간 (개월)</label>
                    <input type="number" id="term" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:outline-none transition-all" placeholder="예: 12">
                </div>
            </div>

            <button onclick="calculateLoan()" class="w-full mt-8 bg-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-lg hover:bg-blue-700 transition-all active:scale-95">
                상환 금액 계산하기
            </button>

            <div id="result-box
